<style>
  #fav-app {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 4px 8px;
    color: var(--main-text-color);
    background: transparent;
  }

  /* ── Filter bar ── */
  .fav-filter {
    margin-bottom: 10px;
  }
  .fav-filter-input {
    width: 100%;
    box-sizing: border-box;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid rgba(128,128,128,0.25);
    border-radius: 6px;
    background: transparent;
    color: inherit;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .fav-filter-input:focus {
    border-color: rgba(128,128,128,0.5);
  }

  /* ── Tag filter bar ── */
  .fav-tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
    min-height: 24px;
  }
  .fav-tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 14px;
    border: 1px solid rgba(128,128,128,0.18);
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    opacity: 0.7;
    user-select: none;
  }
  .fav-tag-chip:hover {
    opacity: 1;
    background: rgba(128,128,128,0.08);
    border-color: rgba(128,128,128,0.3);
  }
  .fav-tag-chip.active {
    opacity: 1;
    background: rgba(128,128,128,0.14);
    border-color: rgba(128,128,128,0.45);
  }

  /* ── Meta ── */
  .fav-meta {
    font-size: 13px;
    opacity: 0.5;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(128,128,128,0.1);
  }

  /* ── Card grid ── */
  .fav-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* ── Card ── */
  .fav-card {
    box-sizing: border-box;
    min-width: 220px;
    flex: 1 0 240px;
    max-width: 320px;
    border: 1px solid rgba(128,128,128,0.15);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    background: transparent;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .fav-card:hover {
    border-color: rgba(128,128,128,0.35);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .fav-card-title {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fav-card-title-icon {
    font-size: 16px;
    flex-shrink: 0;
  }
  .fav-card-title-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fav-card-desc {
    font-size: 12px;
    line-height: 1.55;
    opacity: 0.7;
    border-left: 3px solid rgba(128,128,128,0.25);
    padding-left: 10px;
    display: -webkit-box;
    -webkit-line-clamp: var(--fav-desc-lines, 3);
    -webkit-box-orient: vertical;
    overflow: hidden;
    max-height: calc(1.55em * var(--fav-desc-lines, 3));
  }

  /* icon class support */
  .fav-card-title-icon.i-class {
    font-size: 16px;
    flex-shrink: 0;
  }
  .fav-card-desc:empty {
    display: none;
  }
  .fav-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: auto;
    padding-top: 6px;
  }
  .fav-card-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(128,128,128,0.08);
    border: 1px solid rgba(128,128,128,0.15);
    white-space: nowrap;
    line-height: 1.5;
    opacity: 0.65;
  }

  /* ── Empty state ── */
  .fav-empty {
    text-align: center;
    padding: 60px 24px;
    opacity: 0.4;
    width: 100%;
  }
  .fav-empty-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }
  .fav-empty p {
    margin: 0;
    font-size: 14px;
  }
  .fav-hint {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 6px;
  }
</style>

<div id="fav-app">
  <div class="fav-filter">
    <input
      type="text"
      id="fav-search-input"
      class="fav-filter-input"
      placeholder="搜索标题、标签或内容..."
      spellcheck="false"
      autocomplete="off"
    />
  </div>
  <div id="fav-tag-bar" class="fav-tag-bar"></div>
  <div class="fav-meta" id="fav-meta"></div>
  <div id="fav-grid" class="fav-grid">
    <div class="fav-empty">
      <div class="fav-empty-icon">⭐</div>
      <p>加载中…</p>
    </div>
  </div>
</div>
