<style>
  #fav-app {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 4px 8px;
    color: var(--main-text-color);
    background: transparent;
  }

  /* ── Filter bar ── */
  .fav-filter {
    margin-bottom: 10px;
  }
  .fav-filter-input {
    width: 100%;
    box-sizing: border-box;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid rgba(128,128,128,0.25);
    border-radius: 6px;
    background: transparent;
    color: inherit;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .fav-filter-input:focus {
    border-color: rgba(128,128,128,0.5);
  }

  /* ── Tag input area ── */
  .fav-tag-input-area {
    margin-bottom: 6px;
  }
  .fav-tag-input-area input {
    width: 100%;
    box-sizing: border-box;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid rgba(128,128,128,0.2);
    border-radius: 6px;
    background: transparent;
    color: inherit;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .fav-tag-input-area input:focus {
    border-color: rgba(128,128,128,0.45);
  }

  /* ── Selected tags bar ── */
  .fav-selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 4px 0;
    margin-bottom: 4px;
    min-height: 24px;
  }
  .fav-selected-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(128,128,128,0.12);
    border: 1px solid rgba(128,128,128,0.25);
  }
  .fav-selected-tag .remove-tag {
    cursor: pointer;
    opacity: 0.5;
    font-size: 13px;
    line-height: 1;
    margin-left: 2px;
  }
  .fav-selected-tag .remove-tag:hover {
    opacity: 1;
  }

  /* ── Tag section ── */
  .fav-tag-section-label {
    font-size: 12px;
    opacity: 0.5;
    margin: 6px 2px 4px;
    font-weight: 500;
  }
  .fav-tag-rows {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
    min-height: 20px;
  }
  .fav-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 0 2px;
  }

  /* ── Tag chip ── */
  .fav-tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 14px;
    border: 1px solid rgba(128,128,128,0.18);
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    opacity: 0.7;
    user-select: none;
  }
  .fav-tag-chip:hover {
    opacity: 1;
    background: rgba(128,128,128,0.08);
    border-color: rgba(128,128,128,0.3);
  }
  .fav-tag-chip.active {
    opacity: 1;
    background: rgba(128,128,128,0.14);
    border-color: rgba(128,128,128,0.45);
  }
  .fav-tag-chip.name-active {
    opacity: 1;
    border-color: rgba(100,200,100,0.5);
  }
  .fav-tag-chip .tag-count {
    font-size: 10px;
    opacity: 0.5;
  }
  .fav-tag-chip .tag-name {
    font-weight: 500;
  }
  .fav-tag-chip .tag-value {
    opacity: 0.75;
  }
  .fav-tag-chip .tag-sep {
    opacity: 0.3;
  }
  .fav-empty-tags {
    font-size: 13px;
    opacity: 0.4;
    padding: 8px 4px;
  }

  /* ── Pagination / Meta ── */
  .fav-meta {
    font-size: 13px;
    opacity: 0.5;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(128,128,128,0.1);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .fav-meta .page-btn {
    background: none;
    border: 1px solid rgba(128,128,128,0.25);
    border-radius: 4px;
    padding: 2px 10px;
    color: inherit;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .fav-meta .page-btn:hover {
    background: rgba(128,128,128,0.08);
  }
  .fav-meta .page-select {
    border: 1px solid rgba(128,128,128,0.25);
    border-radius: 4px;
    padding: 2px 4px;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }

  /* ── Card grid ── */
  .fav-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* ── Card ── */
  .fav-card {
    box-sizing: border-box;
    min-width: 220px;
    flex: 1 0 240px;
    max-width: 320px;
    border: 1px solid rgba(128,128,128,0.15);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    background: transparent;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .fav-card[style*="border-color"] {
    border-width: 1.5px;
  }
  .fav-card:hover {
    border-color: rgba(128,128,128,0.35);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .fav-card-title {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fav-card-title-icon.i-class {
    font-size: 16px;
    flex-shrink: 0;
  }
  .fav-card-title-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fav-card-desc {
    font-size: 12px;
    line-height: 1.55;
    opacity: 0.7;
    border-left: 3px solid rgba(128,128,128,0.25);
    padding-left: 10px;
    display: -webkit-box;
    -webkit-line-clamp: var(--fav-desc-lines, 3);
    -webkit-box-orient: vertical;
    overflow: hidden;
    max-height: calc(1.55em * var(--fav-desc-lines, 3));
  }
  .fav-card-desc:empty {
    display: none;
  }
  .fav-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: auto;
    padding-top: 6px;
  }
  .fav-card-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(128,128,128,0.08);
    border: 1px solid rgba(128,128,128,0.15);
    white-space: nowrap;
    line-height: 1.5;
    opacity: 0.65;
  }

  /* ── Empty state ── */
  .fav-empty {
    text-align: center;
    padding: 60px 24px;
    opacity: 0.4;
    width: 100%;
  }
  .fav-empty-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }
  .fav-empty p {
    margin: 0;
    font-size: 14px;
  }
  .fav-hint {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 6px;
  }

  .fav-loading-tags {
    font-size: 13px;
    opacity: 0.4;
    padding: 20px 4px;
  }
</style>

<div id="fav-app">
  <div class="fav-filter">
    <input type="text" id="fav-search-input" class="fav-filter-input" placeholder="搜索标题或内容..." spellcheck="false" autocomplete="off" />
  </div>
  <div class="fav-tag-input-area">
    <input type="text" id="fav-tag-input" placeholder="输入标签名筛选..." spellcheck="false" autocomplete="off" />
  </div>
  <div id="fav-selected-tags" class="fav-selected-tags"></div>
  <div class="fav-tag-section-label">热门标签</div>
  <div id="fav-tag-rows" class="fav-tag-rows">
    <div class="fav-loading-tags">加载标签中...</div>
  </div>
  <div class="fav-meta" id="fav-meta"></div>
  <div id="fav-grid" class="fav-grid">
    <div class="fav-empty">
      <div class="fav-empty-icon">⭐</div>
      <p>加载中…</p>
    </div>
  </div>
</div>
